<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/png" href="assets/cloud.png">
  <title>SKYWONDER</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">
</head>

<body class="bg-black text-white font-sans">

<!-- HERO -->
<section class="min-h-screen flex flex-col items-center justify-center relative overflow-hidden">
  <img src="assets/cloud.png" class="w-16 h-16 sm:w-20 sm:h-20 md:w-32 md:h-32">

  <h1 class="text-5xl sm:text-6xl md:text-8xl lg:text-9xl tracking-[0.15em] mt-4">
    SKYWONDER
  </h1>
</section>

<div class="w-full h-px bg-white/10"></div>

<!-- MAIN AREA -->
<section class="min-h-screen flex flex-col items-center justify-center text-center px-4 gap-10">

  <!-- POLICY BUTTON -->
  <button id="policy-btn"
    class="border border-white/30 px-12 py-4 text-3xl tracking-widest text-white/70 hover:text-white hover:border-white/70 transition-all duration-300">
    POLICY
  </button>

  <!-- GAME LIST -->
  <div id="game-list" class="hidden flex flex-col items-center gap-6 opacity-0 transition-all duration-500">

    <div class="game-item text-3xl tracking-widest text-white/60 cursor-pointer transition-all duration-300">
      UNTAMED
    </div>

  </div>

  <!-- POLICY CONTENT -->
  <div id="policy-content" class="hidden w-full max-w-3xl opacity-0 transition-all duration-500">

    <div class="flex items-center justify-between mb-6">
      <h2 id="game-title" class="text-5xl tracking-widest">UNTAMED</h2>

      <button id="policy-close"
        class="text-white/40 hover:text-white text-xs border border-white/20 px-4 py-2">
        CLOSE
      </button>
    </div>

    <div class="border border-white/10 bg-white/5 p-6 max-h-[60vh] overflow-y-auto text-white/70 text-sm leading-relaxed">
<pre>
YOUR POLICY TEXT HERE (UNCHANGED)
</pre>
    </div>

  </div>

  <!-- TEAM BUTTON -->
  <button id="teamBtn"
    class="border border-white/30 px-12 py-4 text-3xl tracking-widest text-white/70 hover:text-white transition-all">
    OUR TEAM
  </button>

  <!-- TEAM -->
  <div id="teamContent" class="hidden flex flex-col md:flex-row gap-10 opacity-0 transition-all">

    <div class="team-card flex flex-col items-center gap-4 bg-white/5 p-6 border border-white/10">
      <img src="assets/Leaning.jpg" class="w-20 h-20 rounded-full">
      <h3>Leaning</h3>
      <p class="text-white/60 text-sm">Creator & Owner</p>
    </div>

    <div class="team-card flex flex-col items-center gap-4 bg-white/5 p-6 border border-white/10">
      <img src="assets/Gary.jpg" class="w-20 h-20 rounded-full">
      <h3>Gary</h3>
      <p class="text-white/60 text-sm">Co-Founder</p>
    </div>

  </div>

</section>

<script>
const policyBtn = document.getElementById("policy-btn");
const gameList = document.getElementById("game-list");
const gameItems = document.querySelectorAll(".game-item");
const policyContent = document.getElementById("policy-content");
const policyClose = document.getElementById("policy-close");
const gameTitle = document.getElementById("game-title");

// POLICY → show games
policyBtn.addEventListener("click", () => {
  policyBtn.style.opacity = "0";

  setTimeout(() => {
    policyBtn.classList.add("hidden");

    gameList.classList.remove("hidden");
    setTimeout(() => {
      gameList.style.opacity = "1";
    }, 50);

  }, 300);
});

// GAME → show policy
gameItems.forEach(item => {
  item.addEventListener("click", () => {

    gameList.style.opacity = "0";

    setTimeout(() => {
      gameList.classList.add("hidden");

      gameTitle.textContent = item.textContent;

      policyContent.classList.remove("hidden");
      setTimeout(() => {
        policyContent.style.opacity = "1";
      }, 50);

    }, 300);
  });
});

// CLOSE → back to games
policyClose.addEventListener("click", () => {

  policyContent.style.opacity = "0";

  setTimeout(() => {
    policyContent.classList.add("hidden");

    gameList.classList.remove("hidden");
    setTimeout(() => {
      gameList.style.opacity = "1";
    }, 50);

  }, 300);
});
</script>

<style>
.game-item:hover {
  color: cyan;
  transform: scale(1.1);
}
</style>

</body>
</html>
